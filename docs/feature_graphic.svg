<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">

  <!-- Background -->
  <rect x="0" y="0" width="1024" height="500" fill="#0f0f0f"/>

  <!-- Grid lines -->
  <line x1="0" y1="125" x2="1024" y2="125" stroke="#1a1f2a" stroke-width="0.5"/>
  <line x1="0" y1="250" x2="1024" y2="250" stroke="#1a1f2a" stroke-width="0.5"/>
  <line x1="0" y1="375" x2="1024" y2="375" stroke="#1a1f2a" stroke-width="0.5"/>
  <line x1="256"  y1="0" x2="256"  y2="500" stroke="#1a1f2a" stroke-width="0.5"/>
  <line x1="512"  y1="0" x2="512"  y2="500" stroke="#1a1f2a" stroke-width="0.5"/>
  <line x1="768"  y1="0" x2="768"  y2="500" stroke="#1a1f2a" stroke-width="0.5"/>

  <!-- Pulse glow -->
  <polyline
    points="0,250 90,250 120,136 158,364 194,180 226,302 250,250 292,250 322,136 360,364 396,180 428,302 452,250 512,250 542,136 580,364 616,180 648,302 672,250 724,250 754,136 792,364 828,180 860,302 884,250 1024,250"
    fill="none" stroke="#4FC3F7" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" opacity="0.08"/>

  <!-- Pulse main line -->
  <polyline
    points="0,250 90,250 120,136 158,364 194,180 226,302 250,250 292,250 322,136 360,364 396,180 428,302 452,250 512,250 542,136 580,364 616,180 648,302 672,250 724,250 754,136 792,364 828,180 860,302 884,250 1024,250"
    fill="none" stroke="#4FC3F7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Center dot -->
  <circle cx="512" cy="250" r="8" fill="#4FC3F7"/>
  <circle cx="512" cy="250" r="16" fill="none" stroke="#4FC3F7" stroke-width="2" opacity="0.4"/>

  <!-- Left: App name -->
  <text x="60" y="218" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="64" font-weight="700" fill="#ffffff">Vitals</text>
  <text x="62" y="252" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="400" fill="#666666" letter-spacing="3">SYSTEM MONITOR FOR ANDROID</text>
  <text x="62" y="430" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#3a3a3a" letter-spacing="0.5">No ads · No data collected · Always free</text>

  <!-- CPU card -->
  <rect x="648" y="72" width="166" height="96" rx="12" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="0.5"/>
  <circle cx="673" cy="100" r="6" fill="#4FC3F7"/>
  <text x="686" y="105" font-family="-apple-system,sans-serif" font-size="13" fill="#888" letter-spacing="1">CPU</text>
  <text x="662" y="138" font-family="-apple-system,monospace,sans-serif" font-size="22" font-weight="600" fill="#e0e0e0">34%</text>
  <rect x="662" y="152" width="136" height="6" rx="3" fill="#2a2a2a"/>
  <rect x="662" y="152" width="46"  height="6" rx="3" fill="#4FC3F7"/>

  <!-- RAM card -->
  <rect x="836" y="72" width="166" height="96" rx="12" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="0.5"/>
  <circle cx="861" cy="100" r="6" fill="#CE93D8"/>
  <text x="874" y="105" font-family="-apple-system,sans-serif" font-size="13" fill="#888" letter-spacing="1">RAM</text>
  <text x="850" y="138" font-family="-apple-system,monospace,sans-serif" font-size="22" font-weight="600" fill="#e0e0e0">4.2 GB</text>
  <rect x="850" y="152" width="136" height="6" rx="3" fill="#2a2a2a"/>
  <rect x="850" y="152" width="78"  height="6" rx="3" fill="#CE93D8"/>

  <!-- Battery card -->
  <rect x="648" y="192" width="166" height="96" rx="12" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="0.5"/>
  <circle cx="673" cy="220" r="6" fill="#81C784"/>
  <text x="686" y="225" font-family="-apple-system,sans-serif" font-size="13" fill="#888" letter-spacing="1">BATTERY</text>
  <text x="662" y="258" font-family="-apple-system,monospace,sans-serif" font-size="22" font-weight="600" fill="#e0e0e0">87%</text>
  <rect x="662" y="272" width="136" height="6" rx="3" fill="#2a2a2a"/>
  <rect x="662" y="272" width="118" height="6" rx="3" fill="#81C784"/>

  <!-- Network card -->
  <rect x="836" y="192" width="166" height="96" rx="12" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="0.5"/>
  <circle cx="861" cy="220" r="6" fill="#FFB74D"/>
  <text x="874" y="225" font-family="-apple-system,sans-serif" font-size="13" fill="#888" letter-spacing="1">NETWORK</text>
  <text x="850" y="255" font-family="-apple-system,monospace,sans-serif" font-size="18" font-weight="600" fill="#e0e0e0">↓ 2.1 MB/s</text>
  <text x="850" y="276" font-family="-apple-system,sans-serif" font-size="13" fill="#888">↑ 0.4 MB/s</text>

  <!-- Storage card -->
  <rect x="648" y="312" width="166" height="96" rx="12" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="0.5"/>
  <circle cx="673" cy="340" r="6" fill="#4DB6AC"/>
  <text x="686" y="345" font-family="-apple-system,sans-serif" font-size="13" fill="#888" letter-spacing="1">STORAGE</text>
  <text x="662" y="378" font-family="-apple-system,monospace,sans-serif" font-size="22" font-weight="600" fill="#e0e0e0">58 GB</text>
  <rect x="662" y="392" width="136" height="6" rx="3" fill="#2a2a2a"/>
  <rect x="662" y="392" width="66"  height="6" rx="3" fill="#4DB6AC"/>

  <!-- Processes card -->
  <rect x="836" y="312" width="166" height="96" rx="12" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="0.5"/>
  <circle cx="861" cy="340" r="6" fill="#EF9A9A"/>
  <text x="874" y="345" font-family="-apple-system,sans-serif" font-size="13" fill="#888" letter-spacing="1">PROCESSES</text>
  <text x="850" y="378" font-family="-apple-system,monospace,sans-serif" font-size="22" font-weight="600" fill="#e0e0e0">142</text>
  <text x="850" y="396" font-family="-apple-system,sans-serif" font-size="13" fill="#888">running</text>

</svg>
